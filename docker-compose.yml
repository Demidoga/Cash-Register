services:
  api:
    build:
      context: ./api
    restart: unless-stopped
    environment:
      # Supabase Postgres. Use the pooler (session-mode) connection string; see
      # .env.example. A bare postgresql:// URL is normalized to psycopg in db.py.
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set — Supabase pooler connection string}
      DB_DISABLE_PREPARED_STATEMENTS: ${DB_DISABLE_PREPARED_STATEMENTS:-false}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-authenticated}
      SUPABASE_URL: ${SUPABASE_URL:-}
      CLINIC_NAME: ${CLINIC_NAME:-My Clinic}
      DEV_LOGIN_ENABLED: ${DEV_LOGIN_ENABLED:-false}
    ports:
      - "8000:8000"

  web:
    build:
      context: ./web
      args:
        VITE_API_BASE: /api
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
