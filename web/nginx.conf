server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend service (service name "api" in Docker Compose).
    # The trailing "/" strips the /api prefix so /api/setup -> http://api:8000/setup,
    # matching how the backend serves routes (and the Vite dev proxy's rewrite).
    location /api/ {
        proxy_pass         http://api:8000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA fallback: serve index.html for every non-file route
    location / {
        try_files $uri $uri/ /index.html;
    }
}
